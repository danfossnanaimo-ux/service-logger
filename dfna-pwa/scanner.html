<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  video {
    width: 80vw;
    margin-top: 10vh;
    border-radius: 10px;
    background: #111;
  }
</style>

</head>
<body>

<video id="preview"></video>

<script type="module">
  import QrScanner from "./lib/qr-scanner.min.js";
  QrScanner.WORKER_PATH = "./lib/qr-scanner-worker.min.js";

  const video = document.getElementById("preview");

  const scanner = new QrScanner(video, result => {
    const clean = result.trim();
    window.location.href = "status.html?data=" + encodeURIComponent(clean);
  });

  scanner.start();
</script>

</body>
</html>
