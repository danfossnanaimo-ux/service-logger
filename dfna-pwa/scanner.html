<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 80vw;
    margin-top: 10vh;
    text-align: center;
  }

  video {
    width: 80vw;
    height: auto;
    border-radius: 10px;
    background: #111;
  }

  textarea, select, button {
    width: 80vw;
    font-size: 1.2rem;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #444;
    color: #fff;
  }

  button:active {
    background: #666;
  }
</style>

</head>
<body>

<video id="preview" style="width:100%;"></video>

<script type="module">
  import QrScanner from "./lib/qr-scanner.min.js";
  QrScanner.WORKER_PATH = "./lib/qr-scanner-worker.min.js";

  const video = document.getElementById("preview");

  const scanner = new QrScanner(video, result => {
    const clean = result.trim();
    window.location.href = "status.html?data=" + encodeURIComponent(clean);
  });

  scanner.start();
</script>

</body>
</html>
