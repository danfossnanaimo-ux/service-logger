<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Location</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 200%;
  }

  select, button {
    width: 80vw;
    padding: 20px;
    margin-top: 20px;
    font-size: 1em;
    border-radius: 10px;
    border: none;
  }

  #confirmBtn {
    background: #444;
    color: #fff;
  }

  #resetBtn {
    background: #003399;
    color: #fff;
  }

  #micBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: #444;
    color: #fff;
    border-radius: 50%;
    border: none;
    font-size: 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>

</head>
<body>

<select id="loc"></select>

<button id="confirmBtn" onclick="confirmLocation()">Confirm</button>

<button id="resetBtn" onclick="window.location.href='scanner.html'">Reset</button>

<button id="micBtn" onclick="openSpeech()">🎤</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");

  const SHEET_URL = "https://script.google.com/macros/s/AKfycbyX5D2M127vHmKaVzgKoBRQIMhTs-aiEzUAYTmrwc8GASqujHmV7GkIjVle94utALOkUQ/exec";

  async function loadLocations() {
    const res = await fetch(SHEET_URL);
    const list = await res.json();

    const sel = document.getElementById("loc");
    list.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      sel.appendChild(opt);
    });
  }

  function confirmLocation() {
    const loc = document.getElementById("loc").value;
    alert("Out of Service at: " + loc);
  }

  function openSpeech() {
    const dummy = document.createElement("input");
    dummy.style.position = "absolute";
    dummy.style.opacity = 0;
    document.body.appendChild(dummy);
    dummy.focus();
    dummy.click();
    setTimeout(() => dummy.remove(), 500);
  }

  loadLocations();
</script>

</body>
</html>
