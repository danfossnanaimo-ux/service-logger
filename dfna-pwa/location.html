<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Location</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  select, button {
    width: 80vw;
    font-size: 1.2rem;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: none;
  }
  button {
    background: #444;
    color: #fff;
  }
  button:active {
    background: #666;
  }
</style>

</head>
<body>

<select id="loc"></select>

<button onclick="confirmLocation()">Confirm</button>

<button onclick="window.location.href='scanner.html'">Reset</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");

  const SHEET_URL = "https://script.google.com/macros/s/AKfycbyX5D2M127vHmKaVzgKoBRQIMhTs-aiEzUAYTmrwc8GASqujHmV7GkIjVle94utALOkUQ/exec";

  async function loadLocations() {
    const res = await fetch(SHEET_URL);
    const list = await res.json();

    const sel = document.getElementById("loc");
    list.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      sel.appendChild(opt);
    });
  }

  function confirmLocation() {
    const loc = document.getElementById("loc").value;
    alert("Out of Service at: " + loc);
  }

  loadLocations();
</script>

</body>
</html>
