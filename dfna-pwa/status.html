<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  textarea, button {
    width: 80vw;
    font-size: 1.2rem;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: none;
  }
  button {
    background: #444;
    color: #fff;
  }
  button:active {
    background: #666;
  }
</style>

</head>
<body>

<textarea id="box" style="height:200px;"></textarea>

<button onclick="setStatus('in')">In Service</button>
<button onclick="setStatus('side')">Sidelined</button>
<button onclick="setStatus('out')">Out of Service</button>

<button onclick="window.location.href='scanner.html'">Reset</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");
  if (data) document.getElementById("box").value = data;

  function setStatus(status) {
    if (status === "out") {
      window.location.href = "location.html?data=" + encodeURIComponent(data);
    } else {
      alert("Status saved: " + status);
    }
  }
</script>

</body>
</html>
