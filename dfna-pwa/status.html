<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 200%;
  }

  textarea {
    width: 80vw;
    height: 500px; /* 250% taller */
    margin-top: 20px;
    padding: 20px;
    font-size: 1em;
    border-radius: 10px;
    border: none;
  }

  .button-row {
    display: flex;
    width: 80vw;
    justify-content: space-between;
    margin-top: 20px;
  }

  .button-row button {
    flex: 1;
    margin: 0 2px;
    padding: 20px;
    font-size: 1em;
    border-radius: 10px;
    border: none;
    color: #000;
  }

  #useBtn { background: #00cc44; }      /* green */
  #cautionBtn { background: #ffeb3b; }  /* yellow */
  #fixBtn { background: #ff4444; }      /* red */

  #resetBtn {
    width: 80vw;
    margin-top: 20px;
    padding: 20px;
    font-size: 1em;
    background: #003399; /* dark blue */
    color: #fff;
    border-radius: 10px;
    border: none;
  }

  /* Floating microphone button */
  #micBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: #444;
    color: #fff;
    border-radius: 50%;
    border: none;
    font-size: 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>

</head>
<body>

<textarea id="box"></textarea>

<div class="button-row">
  <button id="useBtn" onclick="setStatus('use')">USE</button>
  <button id="cautionBtn" onclick="setStatus('caution')">CAUTION</button>
  <button id="fixBtn" onclick="setStatus('fix')">FIX</button>
</div>

<button id="resetBtn" onclick="window.location.href='scanner.html'">Reset</button>

<!-- Floating microphone button -->
<button id="micBtn" onclick="openSpeech()">🎤</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");
  if (data) document.getElementById("box").value = data;

  function setStatus(status) {
    if (status === "fix") {
      window.location.href = "location.html?data=" + encodeURIComponent(data);
    } else {
      alert("Status saved: " + status);
    }
  }

  function openSpeech() {
    const box = document.getElementById("box");
    box.focus();

    /* Mobile browsers automatically open the speech-to-text keyboard
       when the mic key is pressed on the soft keyboard.
       This triggers the keyboard to open. */
    box.setSelectionRange(box.value.length, box.value.length);
  }
</script>

</body>
</html>
