<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scan Driver QR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h2>Scan Driver QR Code</h2>

  <div class="scan-container">
    <video id="qr-video" style="width:100%; border-radius:8px;"></video>
  </div>

  <p id="statusText">Point the camera at the QR code…</p>

  <script type="module">
    import QrScanner from "./lib/qr-scanner.min.js";
    QrScanner.WORKER_PATH = "./lib/qr-scanner-worker.min.js";

    const videoElem = document.getElementById("qr-video");
    const statusText = document.getElementById("statusText");

    const scanner = new QrScanner(videoElem, result => {
      statusText.textContent = "QR detected: " + result;

      // Redirect to VIN entry page with scanned VIN
      window.location.href = `scan-vin.html?vin=${encodeURIComponent(result)}`;
    });

    scanner.start();
  </script>

</body>
</html>
